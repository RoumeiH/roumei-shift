<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>指定假申請</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif; background:#f0f2f5; color:#1a1a2e; }
  .wrap { max-width:480px; margin:0 auto; padding:16px 14px 40px; }
  h1 { font-size:19px; margin:4px 0 2px; }
  .sub { font-size:13px; color:#6b7280; margin-bottom:14px; }
  .card { background:#fff; border-radius:14px; padding:14px; margin-bottom:14px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .announce { background:#fffbeb; border:1px solid #fde68a; color:#92400e; border-radius:12px; padding:12px 14px; font-size:13px; line-height:1.6; white-space:pre-wrap; margin-bottom:14px; }
  .notice { background:#eff6ff; border:1px solid #bfdbfe; color:#1e40af; border-radius:12px; padding:11px 14px; font-size:13px; line-height:1.7; margin-bottom:14px; }
  .notice b { color:#1d4ed8; }
  .notice .hd { font-weight:700; margin-bottom:4px; display:block; }
  .who { display:flex; align-items:center; gap:8px; font-size:14px; margin-bottom:4px; }
  .who b { font-size:15px; }
  select, button { font-family:inherit; }
  .name-select, .month-select { width:100%; padding:11px; font-size:15px; border:1px solid #d1d5db; border-radius:10px; background:#fff; }
  .month-row { margin-bottom:12px; }
  .month-row label { font-size:13px; color:#6b7280; display:block; margin-bottom:5px; }
  .deadline { font-size:12px; color:#b45309; margin-top:5px; }
  .cal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .cal-title { font-size:15px; font-weight:700; }
  .grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
  .dow { text-align:center; font-size:12px; color:#9ca3af; padding:2px 0; }
  .dow.sun { color:#ef4444; } .dow.sat { color:#3b82f6; }
  .cell { aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; border-radius:10px;
          font-size:15px; cursor:pointer; background:#f3f4f6; user-select:none; transition:.1s; position:relative; }
  .cell.empty { background:transparent; cursor:default; }
  .cell.sun { color:#ef4444; } .cell.sat { color:#3b82f6; }
  .cell.sel { background:#ef4444; color:#fff; font-weight:700; }
  .cell.sel.sun, .cell.sel.sat { color:#fff; }
  .cell .dot { position:absolute; bottom:4px; left:50%; transform:translateX(-50%); width:5px; height:5px; border-radius:50%; background:#3b82f6; }
  .cell.sel .dot { background:#fff; }
  .count { text-align:center; font-size:14px; margin:12px 0 4px; color:#374151; }
  .count b { font-size:18px; color:#ef4444; }
  .warn { font-size:12px; color:#b45309; text-align:center; margin-bottom:6px; min-height:16px; }
  .btn { width:100%; padding:14px; font-size:16px; font-weight:700; border:none; border-radius:12px;
         background:#6366f1; color:#fff; cursor:pointer; margin-top:6px; }
  .btn:disabled { background:#c7cbe0; cursor:not-allowed; }
  .btn.ok { background:#10b981; }
  .loading, .msg { text-align:center; padding:40px 16px; color:#6b7280; font-size:14px; }
  .err { color:#dc2626; }
  .selected-list { font-size:13px; color:#374151; margin-top:8px; line-height:1.8; }
  .pill { display:inline-block; background:#fee2e2; color:#b91c1c; border-radius:20px; padding:2px 10px; margin:2px 3px; font-size:12px; }
  .disclaimer { font-size:12px; color:#b45309; background:#fff7ed; border:1px solid #fed7aa; border-radius:8px; padding:8px 10px; margin:12px 0 4px; line-height:1.5; }
  .foot { font-size:11px; color:#9ca3af; text-align:center; margin-top:18px; line-height:1.6; }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading" id="boot">載入中…</div>
</div>

<script>
// ── 設定 ─────────────────────────────────────────────
const LIFF_ID = "2010583527-DtsQRABf";
const firebaseConfig = {
  apiKey: "AIzaSyB9LgyqQCGjcAiWr4AZjarD8U-Um9lm9Hg",
  authDomain: "hotel-shift-8fc12.firebaseapp.com",
  projectId: "hotel-shift-8fc12",
  storageBucket: "hotel-shift-8fc12.firebasestorage.app",
  messagingSenderId: "676892573469",
  appId: "1:676892573469:web:f14bb143a7f6fe5d662bf4"
};
const SOFT_CAP = 4;            // 指定假建議上限（超過只提醒，不阻擋）
const DEADLINE_DAY = 15;       // 截止日：前一個月的幾號
const OPEN_MONTHS = 4;         // 開放可申請的月份數（從最早開放月起算）
const NOTICE_MIN_DAYS = 3;     // 單筆 ≥ 幾天就列入公告提醒大家
const ANNUAL_MAX = 3;          // 年假每月上限(天)，不指定日期

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const pad = n => String(n).padStart(2, '0');
const keyOf = (y,m) => `${y}-${pad(m+1)}`;
const daysIn = (y,m) => new Date(y, m+1, 0).getDate();
const dstr = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`;
const DOW = '日一二三四五六';

// 開放申請的月份清單（截止日=前一個月 DEADLINE_DAY 號；過期的月份不列入）
function openMonths(){
  const t = new Date();
  let em = t.getMonth() + 1;                 // 下個月(0-based，可超過11，Date 會自動進位)
  if (t.getDate() > DEADLINE_DAY) em += 1;   // 已過下個月的截止日 → 從再下個月起
  const list = [];
  for (let i=0; i<OPEN_MONTHS; i++){
    const d = new Date(t.getFullYear(), em + i, 1);
    list.push({ y:d.getFullYear(), m:d.getMonth() });
  }
  return list;
}
function deadlineLabel(y,m){
  const d = new Date(y, m-1, DEADLINE_DAY);   // 前一個月的 DEADLINE_DAY 號
  return `${d.getFullYear()}/${d.getMonth()+1}/${pad(DEADLINE_DAY)}`;
}

// ── 狀態 ─────────────────────────────────────────────
let profile = null, employees = [], rules = {}, empId = null, empName = null;
let CY = 0, CM = 0;                 // 目前選取的年 / 月(0-based)
let noticeReqs = [];               // 本月 ≥ NOTICE_MIN_DAYS 天的申請(月曆藍點用)
let annualDays = 0;                // 本月申請的年假天數(不指定日期)
let myGuo = 0;                     // 本月主管已套用給本人的國定假日天數
let allNotices = [];               // 跨所有開放月份的長假公告(≥ NOTICE_MIN_DAYS 天)
let bindLocked = false;            // 主管鎖定綁定後，員工不可自行重新綁定
const selected = new Set();
const $app = document.getElementById('app');

function esc(s){ return (s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function nameOf(id){ const e = employees.find(x=>x.id===id); return e ? e.name : id; }
function showBoot(html, isErr){ $app.innerHTML = `<div class="${isErr?'msg err':'loading'}">${html}</div>`; }

// ── 啟動 ─────────────────────────────────────────────
(async function start(){
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    profile = await liff.getProfile();
  } catch (e) {
    showBoot('LINE 初始化失敗：' + esc(e.message || e) + '<br><br>請從 LINE 內開啟本頁面。', true);
    return;
  }
  try {
    const snap = await db.collection('config').doc('main').get();
    const d = snap.exists ? snap.data() : {};
    employees = (d.employees || []).filter(e => e.active !== false);
    rules = d.rules || {};
    const bind = await db.collection('lineBindings').doc(profile.userId).get();
    if (bind.exists && bind.data().empId && employees.some(e => e.id === bind.data().empId)) {
      empId = bind.data().empId;
      empName = nameOf(empId);
      bindLocked = bind.data().locked === true;
      await enterForm();
    } else {
      renderBind();
    }
  } catch (e) {
    showBoot('讀取資料失敗：' + esc(e.message || e), true);
  }
})();

// 讀取某月申請：預載本人已選日期 + 計算 ≥N 天的公告清單
async function loadMonth(){
  selected.clear();
  noticeReqs = [];
  annualDays = 0;
  myGuo = 0;
  try {
    const snap = await db.collection('leaveRequests').doc(keyOf(CY,CM)).get();
    const reqs = (snap.exists && snap.data().requests) ? snap.data().requests : [];
    reqs.filter(r => r.empId === empId && r.source === 'line' && r.kind === 'designated')
        .forEach(r => (r.dates || []).forEach(dt => {
          const d = parseInt(dt.slice(-2), 10); if (d) selected.add(d);
        }));
    noticeReqs = reqs.filter(r => r.kind === 'designated' && (r.dates || []).length >= NOTICE_MIN_DAYS);
    const myAnnual = reqs.find(r => r.empId === empId && r.source === 'line' && r.kind === 'annual');
    annualDays = myAnnual ? (myAnnual.annualLeaveDays || myAnnual.days || 0) : 0;
    myGuo = reqs.filter(r => r.empId === empId && r.status !== 'rejected' && r.status !== 'cancelled')
      .reduce((s,r) => s + (r.leaveItems||[]).filter(i=>i.leaveCode==='國').reduce((a,i)=>a+(i.days||0),0) + (r.leaveCode==='國'?(r.days||0):0), 0);
  } catch(e){ /* 忽略 */ }
}

// 讀取所有開放月份的長假公告(≥ NOTICE_MIN_DAYS 天，跨月顯示)
async function loadAllNotices(){
  allNotices = [];
  for (const o of openMonths()){
    try {
      const snap = await db.collection('leaveRequests').doc(keyOf(o.y,o.m)).get();
      const reqs = (snap.exists && snap.data().requests) ? snap.data().requests : [];
      const long = reqs.filter(r => r.kind === 'designated' && (r.dates || []).length >= NOTICE_MIN_DAYS);
      if (long.length) allNotices.push({ y:o.y, m:o.m, reqs:long });
    } catch(e){ /* 忽略 */ }
  }
}

// ── 綁定畫面（第一次使用選自己是誰）──────────────────
function renderBind(){
  const opts = employees.map(e => `<option value="${e.id}">${esc(e.name)}</option>`).join('');
  $app.innerHTML = `
    <h1>指定假申請</h1>
    <div class="sub">第一次使用，請選擇你的名字（只需一次）</div>
    <div class="card">
      <div class="who">LINE：<b>${esc(profile.displayName)}</b></div>
      <select class="name-select" id="pick">
        <option value="">— 請選擇你的名字 —</option>${opts}
      </select>
      <button class="btn" id="bindBtn" style="margin-top:12px" disabled>確認綁定</button>
    </div>
    <div class="foot">綁定後系統會記住你，下次直接進入申請頁。</div>`;
  const pick = document.getElementById('pick'), btn = document.getElementById('bindBtn');
  pick.onchange = () => btn.disabled = !pick.value;
  btn.onclick = async () => {
    btn.disabled = true; btn.textContent = '綁定中…';
    try {
      empId = pick.value; empName = nameOf(empId);
      await db.collection('lineBindings').doc(profile.userId).set({
        empId, name: empName, lineName: profile.displayName, lineUserId: profile.userId,
        boundAt: new Date().toISOString()
      });
      await enterForm();
    } catch(e){ btn.disabled=false; btn.textContent='確認綁定'; alert('綁定失敗：'+(e.message||e)); }
  };
}

// ── 進入申請畫面：預設最早開放月 ─────────────────────
async function enterForm(){
  const months = openMonths();
  CY = months[0].y; CM = months[0].m;
  await loadMonth();
  await loadAllNotices();
  renderForm(months);
}

function renderForm(months){
  const announce = (rules.announcement || '').trim();
  const monthOpts = months.map(o =>
    `<option value="${o.y}-${o.m}" ${o.y===CY&&o.m===CM?'selected':''}>${o.y} 年 ${o.m+1} 月</option>`
  ).join('');
  $app.innerHTML = `
    <h1>指定假申請</h1>
    <div class="sub">申請人：<b>${esc(empName)}</b> <span style="color:#9ca3af;font-size:12px">(${esc(profile.displayName)})</span>
      ${bindLocked ? '<span style="color:#9ca3af;font-size:12px;margin-left:6px">🔒 已由主管鎖定</span>' : '<a id="rebindLink" style="color:#6366f1;font-size:12px;margin-left:6px;cursor:pointer;text-decoration:underline">不是我？重新綁定</a>'}</div>
    ${announce ? `<div class="announce">📢 ${esc(announce)}</div>` : ''}
    <div id="noticeBox"></div>
    <div id="statBox"></div>
    <div class="card">
      <div class="month-row">
        <label>申請月份（可提前劃未來月份）</label>
        <select class="month-select" id="monthSel">${monthOpts}</select>
        <div class="deadline" id="deadline"></div>
      </div>
      <div class="cal-head"><div class="cal-title" id="calTitle"></div><div style="font-size:12px;color:#9ca3af">點日期切換休假</div></div>
      <div class="grid" id="cal"></div>
      <div class="count">已選 <b id="cnt">0</b> 天</div>
      <div class="warn" id="warn"></div>
      <div class="selected-list" id="sellist"></div>
      <div class="month-row" style="margin-top:14px;border-top:1px solid #f0f0f0;padding-top:12px">
        <label>年假（不指定日期，最多 ${ANNUAL_MAX} 天；由公司視人力安排）</label>
        <select class="month-select" id="annualSel">${
          Array.from({length: ANNUAL_MAX + 1}, (_, i) => `<option value="${i}">${i} 天</option>`).join('')
        }</select>
      </div>
      <div class="disclaimer">※ 送出僅代表「提出申請」，不代表准假；是否核准由主管視人力狀況決定。</div>
      <button class="btn" id="submit">送出申請</button>
    </div>
    <div class="foot">可重複開啟本頁修改後再送出（以最後一次為準）。<br>單筆 ${NOTICE_MIN_DAYS} 天(含)以上會公告提醒同事。</div>`;
  document.getElementById('monthSel').onchange = async (e) => {
    const [y,m] = e.target.value.split('-').map(Number);
    CY = y; CM = m;
    await loadMonth();
    rebuild();
  };
  document.getElementById('annualSel').onchange = e => { annualDays = parseInt(e.target.value, 10) || 0; };
  { const rl = document.getElementById('rebindLink'); if (rl) rl.onclick = rebind; }
  document.getElementById('submit').onclick = submit;
  rebuild();
}

// 重新綁定：清除目前綁定，回到選名字畫面
async function rebind(){
  if (!confirm(`要清除目前綁定（${empName}）並重新選擇名字嗎？`)) return;
  try { await db.collection('lineBindings').doc(profile.userId).delete(); } catch(e){ /* 忽略 */ }
  empId = null; empName = null;
  renderBind();
}

// 重繪月曆 + 公告 + 計數（切換月份後呼叫）
function rebuild(){
  document.getElementById('calTitle').textContent = `${CY} 年 ${CM+1} 月`;
  document.getElementById('deadline').textContent = `截止日：${deadlineLabel(CY,CM)} 前送出`;
  renderNotice();
  renderStat();
  buildCalendar();
  const as = document.getElementById('annualSel'); if (as) as.value = String(annualDays);
  refresh();
}

// 本月可休統計：例假(週日數) + 休假(週六數) + 國定(主管已套用給本人) = 當月可休合計
function renderStat(){
  const box = document.getElementById('statBox');
  if (!box) return;
  let sun = 0, sat = 0;
  const n = daysIn(CY, CM);
  for (let d = 1; d <= n; d++){ const w = new Date(CY, CM, d).getDay(); if (w === 0) sun++; else if (w === 6) sat++; }
  const total = sun + sat + myGuo;
  const cell = (k, v, c) => `<div style="flex:1;text-align:center;padding:8px 2px"><div style="font-size:11px;color:#6b7280">${k}</div><div style="font-size:20px;font-weight:800;color:${c}">${v}</div></div>`;
  box.innerHTML = `<div class="card" style="display:flex;gap:2px;padding:8px;margin-bottom:12px">
    ${cell('例假(日)', sun, '#e11d48')}
    ${cell('休假(六)', sat, '#d97706')}
    ${cell('國定', myGuo, '#7c3aed')}
    ${cell('當月可休', total, '#15803d')}
  </div>`;
}

function renderNotice(){
  const box = document.getElementById('noticeBox');
  if (!allNotices.length){ box.innerHTML=''; return; }
  const groups = allNotices.map(g => {
    const items = g.reqs.slice().sort((a,b)=>(a.dates[0]||'').localeCompare(b.dates[0]||''))
      .map(r => {
        const ds = (r.dates||[]).slice().sort().map(dt => `${parseInt(dt.slice(5,7),10)}/${parseInt(dt.slice(8,10),10)}`).join('、');
        return `<div>・<b>${esc(nameOf(r.empId))}</b>：${ds}（${r.dates.length}天）</div>`;
      }).join('');
    return `<div style="margin-top:6px"><u>${g.y} 年 ${g.m+1} 月</u>${items}</div>`;
  }).join('');
  box.innerHTML = `<div class="notice"><span class="hd">📌 長假公告（畫休滿 ${NOTICE_MIN_DAYS} 天(含)以上，請務必協調錯開）</span>${groups}</div>`;
}

function buildCalendar(){
  const cal = document.getElementById('cal');
  const dows = DOW.split('');
  cal.innerHTML = dows.map((w,i)=>`<div class="dow ${i===0?'sun':i===6?'sat':''}">${w}</div>`).join('');
  const firstDow = new Date(CY, CM, 1).getDay();
  for (let i=0;i<firstDow;i++) cal.insertAdjacentHTML('beforeend','<div class="cell empty"></div>');
  // 本月別人劃長假的日期(標藍點提醒)
  const busy = new Set();
  noticeReqs.forEach(r => { if (r.empId !== empId) (r.dates||[]).forEach(dt => busy.add(parseInt(dt.slice(8,10),10))); });
  const nDays = daysIn(CY, CM);
  for (let d=1; d<=nDays; d++){
    const dow = new Date(CY, CM, d).getDay();
    const cls = dow===0?'sun':dow===6?'sat':'';
    const el = document.createElement('div');
    el.className = `cell ${cls}`;
    el.innerHTML = d + (busy.has(d) ? '<span class="dot"></span>' : '');
    el.dataset.d = d;
    el.onclick = () => { selected.has(d) ? selected.delete(d) : selected.add(d); refresh(); };
    cal.appendChild(el);
  }
}

function refresh(){
  document.querySelectorAll('.cell[data-d]').forEach(el => {
    el.classList.toggle('sel', selected.has(parseInt(el.dataset.d,10)));
  });
  document.getElementById('cnt').textContent = selected.size;
  const warn = document.getElementById('warn');
  warn.textContent = selected.size > SOFT_CAP ? `⚠ 已超過建議 ${SOFT_CAP} 天，請確認是否已與同事協調` : '';
  const list = [...selected].sort((a,b)=>a-b)
    .map(d => `<span class="pill">${CM+1}/${d}（${DOW[new Date(CY,CM,d).getDay()]}）</span>`).join('');
  document.getElementById('sellist').innerHTML = list;
}

async function submit(){
  const btn = document.getElementById('submit');
  if (selected.size === 0 && annualDays === 0 && !confirm('未選任何日期、年假也是 0，將清除你這個月的申請，確定？')) return;
  btn.disabled = true; btn.textContent = '送出中…';
  try {
    const ref = db.collection('leaveRequests').doc(keyOf(CY,CM));
    await db.runTransaction(async tx => {
      const snap = await tx.get(ref);
      let reqs = (snap.exists && snap.data().requests) ? snap.data().requests.slice() : [];
      reqs = reqs.filter(r => !(r.empId === empId && r.source === 'line' && (r.kind === 'designated' || r.kind === 'annual')));
      const stamp = new Date().toISOString();
      if (selected.size > 0){
        reqs.push({
          empId, kind:'designated', status:'pending',
          dates: [...selected].sort((a,b)=>a-b).map(d => dstr(CY,CM,d)),
          days: selected.size, leaveItems: [], annualLeaveDays: 0,
          note:'LINE 指定假申請', source:'line',
          lineUserId: profile.userId, lineName: profile.displayName,
          submittedAt: stamp
        });
      }
      if (annualDays > 0){
        reqs.push({
          empId, kind:'annual', status:'pending',
          dates: [], days: annualDays,
          leaveItems: [{ leaveCode:'年', days: annualDays }], annualLeaveDays: annualDays,
          note:'LINE 年假申請', source:'line',
          lineUserId: profile.userId, lineName: profile.displayName,
          submittedAt: stamp
        });
      }
      tx.set(ref, { requests: reqs });
    });
    btn.className = 'btn ok'; btn.textContent = '✓ 已送出';
    setTimeout(() => {
      if (liff.isInClient()) liff.closeWindow();
      else btn.textContent = '✓ 已送出，可關閉本頁';
    }, 900);
  } catch(e){
    btn.disabled = false; btn.className = 'btn'; btn.textContent = '送出申請';
    alert('送出失敗：' + (e.message || e));
  }
}
</script>
</body>
</html>
